name: homebridge CI/CD

on:
  push:
    branches: [main]
    paths:
      - "applications/homebridge/**"
      - ".github/workflows/homebridge.yml"
  pull_request:
    branches: [main]
    paths:
      - "applications/homebridge/**"
      - ".github/workflows/homebridge.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bokristoffersson/homebridge

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-24.04-arm
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349  # v3.7.1

      - name: Log in to Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@906ecf0fc0a80f9110f79d9e6c04b1080f4a2621  # v5.6.1
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=main

      - name: Build and push Docker image
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355  # v6.10.0
        with:
          context: ./applications/homebridge
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=homebridge
          cache-to: type=gha,mode=max,scope=homebridge

      - name: Verify push
        run: |
          echo "Tags that were pushed:"
          echo "${{ steps.meta.outputs.tags }}" | while IFS= read -r tag; do
            echo "  - $tag"
          done
          sleep 10
          if docker buildx imagetools inspect "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main" >/dev/null 2>&1; then
            echo "Image confirmed in registry (main tag exists)"
          else
            echo "Image NOT found in registry (main tag missing)" >&2
            exit 1
          fi
