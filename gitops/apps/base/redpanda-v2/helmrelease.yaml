apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redpanda-v2
  namespace: redpanda-v2
spec:
  interval: 10m
  chart:
    spec:
      chart: redpanda
      version: "25.1.2"
      sourceRef:
        kind: HelmRepository
        name: redpanda
        namespace: flux-system
  values:
    # Quieter broker logs: the chart default is info, which is chatty.
    # Warn still surfaces real broker issues (raft, disk, partition errors).
    logging:
      logLevel: warn

    # Override cluster name to avoid conflicts with old deployment
    fullnameOverride: "redpanda-v2"

    # Resource configuration (25.x uses different structure)
    resources:
      cpu:
        cores: 1
      memory:
        container:
          max: 2Gi

    statefulset:
      replicas: 1
      # Loosen probes: under CPU pressure on p0 the broker can't answer
      # /v1/status/ready within the chart default timeoutSeconds=1, so kubelet
      # SIGKILLs it (exit 137) every ~20 min, breaking the data pipeline.
      #
      # The redpanda 25.1.2 chart does not expose livenessProbe/readinessProbe
      # under statefulset (schema rejects them). Override the liveness probe via
      # podTemplate.spec, which is strategically merged into the final PodSpec
      # (container matched by name "redpanda"); the chart's exec handler is
      # preserved, only the timings are loosened.
      #
      # Only the liveness probe is overridden: it is the one whose failure
      # SIGKILLs the broker, and it is the only probe the chart defines for the
      # redpanda container. The chart defines no readinessProbe, so specifying
      # one here would render a probe without a handler ("must specify a handler
      # type") and the kubelet would reject the Pod.
      podTemplate:
        spec:
          containers:
            - name: redpanda
              livenessProbe:
                initialDelaySeconds: 10
                periodSeconds: 30
                timeoutSeconds: 10
                failureThreshold: 5

    storage:
      persistentVolume:
        enabled: true
        size: 50Gi
        storageClass: longhorn

    tls:
      enabled: false

    # Console configuration with basePath for subpath hosting
    console:
      enabled: true
      config:
        server:
          basePath: /admin/redpanda
          stripPrefix: false  # Traefik already strips the prefix
        authentication:
          useSecureCookies: true
          oidc:
            enabled: false

    # Monitoring disabled - Prometheus Operator CRDs not installed
    monitoring:
      enabled: false

    external:
      enabled: false

    listeners:
      admin:
        port: 9644
        tls:
          enabled: false
        external:
          default:
            enabled: false
      kafka:
        port: 9092  # Keep 9092 for compatibility with existing services
        tls:
          enabled: false
        external:
          default:
            enabled: false
      http:
        enabled: true
        port: 8082
      schemaRegistry:
        enabled: false
