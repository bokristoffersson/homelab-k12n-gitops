apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: loki
      version: "6.55.*"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 15m
  values:
    # Single-binary, filesystem-backed Loki. Smallest sensible footprint for a
    # two-node Raspberry Pi cluster; no object storage / distributed components.
    deploymentMode: SingleBinary

    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
      storage:
        type: filesystem
        bucketNames:
          chunks: chunks
          ruler: ruler
          admin: admin
      limits_config:
        retention_period: 168h # 7 days
        reject_old_samples: true
        reject_old_samples_max_age: 168h
      compactor:
        # Keep the compactor's working dir on the persistent volume so
        # retention/compaction markers survive restarts and actually apply.
        working_directory: /var/loki/compactor
        retention_enabled: true
        delete_request_store: filesystem

    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: longhorn
        size: 5Gi
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi

    # Distributed read/write/backend paths disabled in SingleBinary mode.
    read:
      replicas: 0
    write:
      replicas: 0
    backend:
      replicas: 0

    # Trim everything not needed at homelab scale.
    gateway:
      enabled: false
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
    lokiCanary:
      enabled: false
    test:
      enabled: false
    minio:
      enabled: false
