---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelab-chat-api
  namespace: homelab-chat-api
  labels:
    app: homelab-chat-api
    backstage.io/kubernetes-id: homelab-chat-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homelab-chat-api
  template:
    metadata:
      labels:
        app: homelab-chat-api
        backstage.io/kubernetes-id: homelab-chat-api
    spec:
      containers:
        - name: app
          image: ghcr.io/bokristoffersson/homelab-chat-api:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: homelab-chat-api-config
            - secretRef:
                name: homelab-chat-api-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
