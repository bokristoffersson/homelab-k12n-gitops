---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homelab-chat-api-config
  namespace: homelab-chat-api
data:
  AUTHENTIK_ISSUER: "https://auth.k12n.com"
  AUTHENTIK_TOKEN_URL: "https://auth.k12n.com/api/oidc/token"
  AGENT_CLIENT_ID: "homelab-chat-agent"
  # Authelia rejects openid/profile/email for the client_credentials grant: resource scopes only.
  AGENT_SCOPES: "read:energy read:heatpump read:temperature read:settings read:plugs write:plugs"
  HOMELAB_API_MCP_URL: "http://homelab-api.homelab-api:8080/mcp"
  HOMELAB_SETTINGS_API_MCP_URL: "http://homelab-settings-api.homelab-settings:8080/mcp"
  LLM_PROVIDER: "anthropic"
  LLM_MODEL: "claude-sonnet-4-6"
  MLX_SERVER_URL: "http://Bos-MacBook-Pro.local:8080/v1"
