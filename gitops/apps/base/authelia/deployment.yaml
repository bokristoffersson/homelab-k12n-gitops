---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authelia
  namespace: authelia
  labels:
    app: authelia
spec:
  replicas: 1
  strategy:
    # SQLite on a single RWO volume — never run two writers at once
    type: Recreate
  selector:
    matchLabels:
      app: authelia
  template:
    metadata:
      labels:
        app: authelia
    spec:
      # The Service is named "authelia", so Kubernetes would inject AUTHELIA_PORT etc.
      # service-link env vars, which Authelia misreads as config keys (collides with
      # server.address). Disable service links to keep the env clean.
      enableServiceLinks: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: authelia
          image: ghcr.io/authelia/authelia:4.39.20
          # Non-secret config + a secret fragment (session/storage/jwt/hmac/jwks key)
          # merged at load time. List-item secrets (the jwks key) can't be injected via
          # *_FILE env vars, so they live in the merged fragment instead.
          # The image entrypoint exec's its args directly, so arg[0] must be the
          # binary name (matches `authelia crypto …` invocations).
          args:
            - authelia
            - --config=/config/configuration.yml
            - --config=/config/secret/secret.yml
          ports:
            - name: http
              containerPort: 9091
          volumeMounts:
            - name: config
              mountPath: /config/configuration.yml
              subPath: configuration.yml
              readOnly: true
            - name: users
              mountPath: /config/users
              readOnly: true
            - name: secrets
              mountPath: /config/secret
              readOnly: true
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /api/health
              port: 9091
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 9091
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: authelia-config
        - name: users
          secret:
            secretName: authelia-users
        - name: secrets
          secret:
            secretName: authelia-secrets
        - name: data
          persistentVolumeClaim:
            claimName: authelia-data
