apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: grafana
  labels:
    backstage.io/kubernetes-id: grafana
spec:
  interval: 5m
  install:
    timeout: 15m
  upgrade:
    timeout: 15m
  chart:
    spec:
      chart: grafana
      version: "8.3.*"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    replicas: 1

    # Persistence is a single Longhorn RWO PVC. With the default RollingUpdate
    # strategy a new pod can't attach the volume until the old one releases it,
    # which deadlocks every upgrade ("Multi-Attach error"). Recreate tears down
    # the old pod before starting the new one.
    deploymentStrategy:
      type: Recreate

    podLabels:
      backstage.io/kubernetes-id: grafana

    persistence:
      enabled: true
      storageClassName: longhorn

    # Environment variables available to all containers (including sidecar)
    extraEnv:
      - name: PG_USER
        valueFrom:
          secretKeyRef:
            name: grafana-timescaledb-secret
            key: POSTGRES_USER
      - name: PG_PASSWORD
        valueFrom:
          secretKeyRef:
            name: grafana-timescaledb-secret
            key: POSTGRES_PASSWORD

    sidecar:
      datasources:
        enabled: true
        label: grafana_datasource
        searchNamespace: grafana
        # Also set in sidecar for explicit configuration
        envValueFrom:
          PG_USER:
            secretKeyRef:
              name: grafana-timescaledb-secret
              key: POSTGRES_USER
          PG_PASSWORD:
            secretKeyRef:
              name: grafana-timescaledb-secret
              key: POSTGRES_PASSWORD
      # Auto-load any ConfigMap labelled grafana_dashboard=1 as a dashboard.
      # searchNamespace ALL so dashboards can live in any namespace (e.g. the
      # monitoring namespace alongside the metrics stack), not just grafana.
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: ALL
        folderAnnotation: grafana_folder
        provider:
          foldersFromFilesStructure: false

    admin:
      existingSecret: grafana-admin
      userKey: admin-user
      passwordKey: admin-password

    resources:
      limits:
        cpu: "500m"
        memory: "512Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"

    service:
      type: ClusterIP
      port: 80

    downloadDashboards:
      enabled: false

