---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda-connect
  namespace: timescaledb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda-connect
  template:
    metadata:
      labels:
        app: redpanda-connect
    spec:
      containers:
        - name: redpanda-connect
          image: redpandadata/connect:latest
          args:
            - streams
            - /config/*.yaml
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: timescaledb-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: timescaledb-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: timescaledb-credentials
                  key: POSTGRES_DB
          ports:
            - containerPort: 4195
              name: http
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          # Loosen probes: the sink runs on a CPU-saturated node (p0) and the
          # connect process can't answer /ping within the default
          # timeoutSeconds=1, so kubelet SIGKILLs it into a restart loop.
          livenessProbe:
            httpGet:
              path: /ping
              port: 4195
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 4195
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
      volumes:
        - name: config
          configMap:
            name: redpanda-connect-config
