apiVersion: v1
kind: ConfigMap
metadata:
  name: energy-ws-config
  namespace: energy-ws
data:
  config.yaml: |
    kafka:
      brokers: "redpanda-v2.redpanda-v2.svc.cluster.local:9092"
      topic: "homelab-energy-realtime"
      group_id: "energy-ws"
      auto_offset_reset: "latest"  # Only new messages for real-time

    server:
      host: "0.0.0.0"
      port: 8080
      max_connections: 1000

    auth:
      # Single Authelia issuer, JWKS-based JWT validation (RS256). The clients whose
      # tokens reach energy-ws (oauth2-proxy, homelab-macos) issue JWT access tokens.
      issuers:
        - name: authelia
          issuer: "https://auth.k12n.com"
          jwks_url: "https://auth.k12n.com/jwks.json"

      # Placeholder for legacy HS256 - not used when issuers[] is configured
      jwt_secret: "placeholder"
