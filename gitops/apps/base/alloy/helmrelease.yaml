apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: alloy
      version: "1.10.*"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      interval: 15m
  values:
    # Pin the ServiceAccount name so RBAC bindings have an explicit contract
    # instead of relying on the chart's default (release-name) naming.
    serviceAccount:
      create: true
      name: alloy

    # DaemonSet tailing each node's pod log files under /var/log/pods. This is
    # the standard, mature Loki collection pattern: no API-server log streaming
    # load, natural per-node sharding (each node only sees its own files, so no
    # duplication), and no pods/log RBAC needed.
    controller:
      type: daemonset

    alloy:
      clustering:
        enabled: false
      # Mount the host /var/log so the DaemonSet can read /var/log/pods/*.
      mounts:
        varlog: true
        dockercontainers: false
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 512Mi
      configMap:
        content: |
          logging {
            level  = "info"
            format = "logfmt"
          }

          discovery.kubernetes "pods" {
            role = "pod"
          }

          discovery.relabel "pod_logs" {
            targets = discovery.kubernetes.pods.targets

            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              target_label  = "pod"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              target_label  = "container"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_node_name"]
              target_label  = "node"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_label_app"]
              target_label  = "app"
            }
            // Build the on-disk log path; the glob only matches files that
            // exist on this node, so each DaemonSet pod tails just its node.
            rule {
              source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
              separator     = "/"
              action        = "replace"
              replacement   = "/var/log/pods/*$1*/*.log"
              target_label  = "__path__"
            }
          }

          local.file_match "pods" {
            path_targets = discovery.relabel.pod_logs.output
          }

          loki.source.file "pods" {
            targets    = local.file_match.pods.targets
            forward_to = [loki.process.default.receiver]
          }

          loki.process "default" {
            // k3s uses containerd, whose log files are in CRI format.
            stage.cri {}
            forward_to = [loki.write.default.receiver]
          }

          loki.write "default" {
            endpoint {
              url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
            }
          }
