apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring # Create this namespace first
spec:
  interval: 15m
  install:
    crds: CreateReplace  # Ensure CRDs are installed
  upgrade:
    crds: CreateReplace  # Ensure CRDs are updated
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 77.12.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 15m
  values:

    prometheus:
      prometheusSpec:
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 50Gi

        retention: 15d
        retentionSize: 45GB

        # Discover ServiceMonitors/PodMonitors/Rules across ALL namespaces,
        # not just those carrying this release's Helm labels. Without this the
        # operator-managed Prometheus scrapes almost nothing in a GitOps setup.
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false

        resources:
          requests:
            cpu: 200m
            memory: 768Mi
          limits:
            memory: 1536Mi

    alertmanager:
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 10Gi

    # Grafana is deployed separately (grafana namespace / own HelmRelease).
    grafana:
      enabled: false