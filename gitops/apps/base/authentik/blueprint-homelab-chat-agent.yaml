---
apiVersion: v1
kind: ConfigMap
metadata:
  name: blueprint-homelab-chat-agent
  namespace: authentik
  labels:
    app.kubernetes.io/name: authentik-blueprints
    blueprints.goauthentik.io/instantiate: "true"
data:
  homelab-chat-agent.yaml: |
    version: 1
    metadata:
      name: homelab-chat-agent
    entries:
      # Service Account for the chat agent's client credentials flow
      - model: authentik_core.user
        identifiers:
          username: homelab-chat-agent-service
        attrs:
          name: Homelab Chat Agent Service Account
          is_active: true
          type: service_account
          path: services

      # Scopes that do not already exist in blueprint-heatpump-web.yaml
      - model: authentik_providers_oauth2.scopemapping
        id: scope-read-temperature
        identifiers:
          scope_name: read:temperature
        attrs:
          name: Read Temperature Data
          scope_name: read:temperature
          description: Read temperature and humidity telemetry
          expression: |
            return {
              "read:temperature": True
            }

      - model: authentik_providers_oauth2.scopemapping
        id: scope-read-plugs
        identifiers:
          scope_name: read:plugs
        attrs:
          name: Read Plug State
          scope_name: read:plugs
          description: Read smart plug state and metadata
          expression: |
            return {
              "read:plugs": True
            }

      - model: authentik_providers_oauth2.scopemapping
        id: scope-write-plugs
        identifiers:
          scope_name: write:plugs
        attrs:
          name: Write Plug State
          scope_name: write:plugs
          description: Toggle smart plugs on or off
          expression: |
            return {
              "write:plugs": True
            }

      # OAuth2 Provider for Client Credentials
      - model: authentik_providers_oauth2.oauth2provider
        id: homelab-chat-agent-provider
        identifiers:
          name: homelab-chat-agent
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
          client_type: confidential
          client_id: homelab-chat-agent
          redirect_uris: []
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
          access_token_validity: hours=24
          refresh_token_validity: days=30
          issuer_mode: per_provider
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "read:energy"]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "read:heatpump"]]
            - !KeyOf scope-read-temperature
            - !KeyOf scope-read-plugs
            - !KeyOf scope-write-plugs

      # Application wrapping the provider
      - model: authentik_core.application
        identifiers:
          slug: homelab-chat-agent
        attrs:
          name: Homelab Chat Agent
          slug: homelab-chat-agent
          provider: !KeyOf homelab-chat-agent-provider
          policy_engine_mode: any
          meta_description: Service account used by homelab-chat-api to call MCP tools on behalf of users
          open_in_new_tab: false
