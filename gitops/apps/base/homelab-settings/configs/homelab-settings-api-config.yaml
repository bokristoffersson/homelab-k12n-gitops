# Application configuration
database:
  url: "postgresql://$(DATABASE_USER):$(DATABASE_PASSWORD)@postgres.homelab-settings.svc.cluster.local:5432/homelab_settings"
  max_connections: 10
  min_connections: 2

api:
  host: "0.0.0.0"
  port: 8080

kafka:
  brokers:
    - "redpanda-v2.redpanda-v2.svc.cluster.local:9092"
  topic: "homelab-heatpump-telemetry"
  plug_topic: "homelab-plug-telemetry"
  consumer_group: "homelab-settings-api"
  auto_offset_reset: "latest"
  session_timeout_ms: 6000
  enable_auto_commit: true
  auto_commit_interval_ms: 5000

auth:
  # Single Authelia issuer. JWT access tokens (homelab-macos, oauth2-proxy, chat
  # agent) validate via JWKS; opaque tokens validate via introspection.
  issuers:
    - name: authelia
      issuer: "https://auth.k12n.com"
      jwks_url: "https://auth.k12n.com/jwks.json"
      introspection_url: "https://auth.k12n.com/api/oidc/introspection"
      introspection_client_id: "$(INTROSPECTION_CLIENT_ID)"
      introspection_client_secret: "$(INTROSPECTION_CLIENT_SECRET)"

logging:
  level: "info"
  format: "json"
