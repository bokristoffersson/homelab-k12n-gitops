---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homebridge
  namespace: homebridge
  labels:
    app: homebridge
    backstage.io/kubernetes-id: homebridge
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: homebridge
  template:
    metadata:
      labels:
        app: homebridge
        backstage.io/kubernetes-id: homebridge
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: p0
      initContainers:
        - name: setup
          image: homebridge/homebridge:2026-04-20
          imagePullPolicy: IfNotPresent
          command: ["bash", "-c"]
          args:
            - |
              set -euo pipefail
              # Install the mqttthing plugin into the storage path Homebridge
              # actually searches (-P /var/lib/homebridge/node_modules
              # --strict-plugin-resolution). /var/lib/homebridge is a symlink
              # to /homebridge, which is the PVC mount, so this persists.
              if [ ! -d /homebridge/node_modules/homebridge-mqttthing ] || \
                 ! grep -q "\"homebridge-mqttthing\": \"${MQTTTHING_VERSION}\"" /homebridge/package.json 2>/dev/null; then
                echo "Installing homebridge-mqttthing@${MQTTTHING_VERSION}"
                cd /homebridge
                npm install --no-audit --no-fund "homebridge-mqttthing@${MQTTTHING_VERSION}"
              else
                echo "homebridge-mqttthing@${MQTTTHING_VERSION} already installed"
              fi
              # Render config.json with MQTT credentials substituted in.
              node -e "
                const fs = require('fs');
                let c = fs.readFileSync('/tmp/config-template/config.json', 'utf8');
                c = c.replace(/@MQTT_USER@/g, process.env.MQTT_USER || '');
                c = c.replace(/@MQTT_PASSWORD@/g, process.env.MQTT_PASSWORD || '');
                fs.writeFileSync('/homebridge/config.json', c);
                console.log('Rendered /homebridge/config.json');
              "
          env:
            - name: MQTTTHING_VERSION
              value: "1.1.49"
            - name: MQTT_USER
              valueFrom:
                secretKeyRef:
                  name: homebridge-mqtt-credentials
                  key: MQTT_USER
            - name: MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homebridge-mqtt-credentials
                  key: MQTT_PASSWORD
          volumeMounts:
            - name: config-template
              mountPath: /tmp/config-template
            - name: storage
              mountPath: /homebridge
      containers:
        - name: homebridge
          image: homebridge/homebridge:2026-04-20
          imagePullPolicy: IfNotPresent
          ports:
            - name: hap
              containerPort: 51826
              protocol: TCP
            - name: ui
              containerPort: 8581
              protocol: TCP
          env:
            - name: HOMEBRIDGE_CONFIG_UI
              value: "1"
            - name: HOMEBRIDGE_CONFIG_UI_PORT
              value: "8581"
            - name: TZ
              value: "Europe/Stockholm"
          volumeMounts:
            - name: storage
              mountPath: /homebridge
          livenessProbe:
            tcpSocket:
              port: 51826
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8581
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: config-template
          configMap:
            name: homebridge-config
        - name: storage
          persistentVolumeClaim:
            claimName: homebridge-storage
