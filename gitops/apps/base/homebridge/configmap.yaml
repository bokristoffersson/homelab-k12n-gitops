---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homebridge-config
  namespace: homebridge
data:
  config.json: |
    {
      "bridge": {
        "name": "Homelab",
        "username": "CC:22:3D:E3:CE:30",
        "port": 51826,
        "pin": "031-45-154",
        "advertiser": "ciao"
      },
      "accessories": [
        {
          "accessory": "mqttthing",
          "type": "thermostat",
          "name": "Värmepump",
          "url": "mqtt://mosquitto.mosquitto.svc.cluster.local:1883",
          "username": "@MQTT_USER@",
          "password": "@MQTT_PASSWORD@",
          "topics": {
            "getCurrentTemperature": {
              "topic": "thermiq_heatpump/data",
              "apply": "return JSON.parse(message).INDR_T;"
            },
            "getTargetTemperature": {
              "topic": "thermiq_heatpump/data",
              "apply": "return JSON.parse(message).d50;"
            },
            "setTargetTemperature": {
              "topic": "thermiq_heatpump/write",
              "apply": "return JSON.stringify({ d50: message });"
            }
          },
          "minTemperature": 10,
          "maxTemperature": 30
        },
        {
          "accessory": "mqttthing",
          "type": "temperatureSensor",
          "name": "Inomhustemperatur",
          "url": "mqtt://mosquitto.mosquitto.svc.cluster.local:1883",
          "username": "@MQTT_USER@",
          "password": "@MQTT_PASSWORD@",
          "topics": {
            "getCurrentTemperature": {
              "topic": "shellyhtg3-e4b32322a0f4/events/rpc",
              "apply": "var p = JSON.parse(message).params; return p && p['temperature:0'] ? p['temperature:0'].tC : undefined;"
            }
          }
        },
        {
          "accessory": "mqttthing",
          "type": "humiditySensor",
          "name": "Inomhusfuktighet",
          "url": "mqtt://mosquitto.mosquitto.svc.cluster.local:1883",
          "username": "@MQTT_USER@",
          "password": "@MQTT_PASSWORD@",
          "topics": {
            "getCurrentRelativeHumidity": {
              "topic": "shellyhtg3-e4b32322a0f4/events/rpc",
              "apply": "var p = JSON.parse(message).params; return p && p['humidity:0'] ? p['humidity:0'].rh : undefined;"
            }
          }
        },
        {
          "accessory": "mqttthing",
          "type": "lightbulb",
          "name": "Arvids rum",
          "url": "mqtt://mosquitto.mosquitto.svc.cluster.local:1883",
          "username": "@MQTT_USER@",
          "password": "@MQTT_PASSWORD@",
          "topics": {
            "getOn": {
              "topic": "tele/arvids_rum/STATE",
              "apply": "return JSON.parse(message).POWER === 'ON';"
            },
            "setOn": {
              "topic": "cmnd/arvids_rum/POWER",
              "apply": "return message ? 'ON' : 'OFF';"
            }
          }
        },
        {
          "accessory": "mqttthing",
          "type": "lightbulb",
          "name": "Matrummet",
          "url": "mqtt://mosquitto.mosquitto.svc.cluster.local:1883",
          "username": "@MQTT_USER@",
          "password": "@MQTT_PASSWORD@",
          "topics": {
            "getOn": {
              "topic": "tele/matrummet/STATE",
              "apply": "return JSON.parse(message).POWER === 'ON';"
            },
            "setOn": {
              "topic": "cmnd/matrummet/POWER",
              "apply": "return message ? 'ON' : 'OFF';"
            }
          }
        }
      ],
      "platforms": [
        {
          "platform": "config",
          "name": "Config",
          "port": 8581,
          "auth": "form",
          "theme": "auto",
          "tempUnits": "c",
          "lang": "auto"
        }
      ]
    }
