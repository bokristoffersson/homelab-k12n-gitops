---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homelab-api-config
  namespace: homelab-api
data:
  config.yaml: |
    database:
      url: "postgresql://$(DATABASE_USER):$(DATABASE_PASSWORD)@timescaledb.timescaledb.svc.cluster.local:5432/telemetry"

    api:
      host: "0.0.0.0"
      port: 8080

    auth:
      # Single Authelia issuer. JWT access tokens (homelab-macos, service accounts)
      # validate via JWKS; opaque tokens (heatpump-web SPA) validate via introspection.
      issuers:
        - name: authelia
          issuer: "https://auth.k12n.com"
          jwks_url: "https://auth.k12n.com/jwks.json"
          introspection_url: "https://auth.k12n.com/api/oidc/introspection"
          introspection_client_id: "$(INTROSPECTION_CLIENT_ID)"
          introspection_client_secret: "$(INTROSPECTION_CLIENT_SECRET)"

      # Placeholder for config parsing compatibility (legacy)
      jwt_secret: "placeholder"
